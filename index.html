    function parseCSV(text) {
      let p = '', row = [''], ret = [row], i = 0, r = 0, s = !0, l;
      for (l of text) {
        if ('"' === l) {
          if (s && l === p) row[i] += l;
          s = !s;
        } else if (',' === l && s) l = row[++i] = '';
        else if ('\n' === l && s) {
          if ('\r' === p) row[i] = row[i].slice(0, -1);
          row = ret[++r] = [l = '']; i = 0;
        } else row[i] += l;
        p = l;
      }
      if (ret.length > 0 && ret[ret.length - 1].length === 1 && ret[ret.length - 1][0] === '') {
        ret.pop();
      }
      return ret;
    }

    function getCurrentWeekAndYear() {
      const now = new Date();
      const year = now.getFullYear();
      const jan1 = new Date(year, 0, 1);
      
      let day = jan1.getDay();
      let diffToMonday = day === 0 ? -6 : 1 - day; 
      
      const firstWeekStart = new Date(year, 0, 1 + diffToMonday);
      firstWeekStart.setHours(0, 0, 0, 0);
      
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const diff = today - firstWeekStart;
      const week = Math.floor(diff / (1000 * 60 * 60 * 24 * 7)) + 1;
      
      return { year, week };
    }

        const month = targetDate.getMonth() + 1;
        const date = targetDate.getDate();

        return `${week}주차 (${month}/${date})`;

      const availableWeeks = useMemo(() => {

      // 팝업창 전용 동적 기간(직전 N주) 통계 계산 로직

          const weekStr = `${row['연도']}-${String(row['주차']).padStart(2, '0')}`;

            const val = parseNum(row[key]);
            if (isExpected) expected[key] += val;
            if (isActual) {

              if (key === 'N' && val > 0) weeksWithN.add(weekStr);

          });

          if (isActual) activeWeeks.add(weekStr);
        });

        return { expected, actual, activeWeeks, weeksWithN };

        const message = `[파트너스본부 주간 코칭 메시지]\n\n${member.이름} 파트너님, 지난 한 주도 현장에서 고군분투하시느라 정말 고생 많으셨습니다.\n\n${quote}\n\n${analysis}\n\n${encouragement}`;
        
        setCoachingModal({ member, type, metricText, message });
        setCopied(false);
      };

      const handleCopyMessage = () => {
        if (coachingModal && coachingModal.message) {
          navigator.clipboard.writeText(coachingModal.message)
            .then(() => setCopied(true))
            .catch(err => console.error('Failed to copy text: ', err));
          
          // 폴백 로직 (iframe 환경 대비)
          const textArea = document.createElement("textarea");
          textArea.value = coachingModal.message;
          document.body.appendChild(textArea);
          textArea.focus();
          textArea.select();
          try {
            document.execCommand('copy');
            setCopied(true);
          } catch (err) {
            console.error('Fallback: Oops, unable to copy', err);
          }
          document.body.removeChild(textArea);
          
          setTimeout(() => setCopied(false), 2000);
        }
      };

      const filteredData = useMemo(() => {
        return data.filter(item => {
          const effectiveTab = (selectedTab === '본부 진단 리포트') ? '결과' : selectedTab;
          const matchTab = item['예정결과'] === effectiveTab;
          const matchYear = item['연도'] === String(selectedYear);
          const matchWeek = item['주차'] === String(selectedWeek);
          const matchDept = selectedDept === '전체' || item['소속'] === selectedDept;
          return matchTab && matchYear && matchWeek && matchDept;
        });
      }, [data, selectedTab, selectedYear, selectedWeek, selectedDept]);

      const processedData = useMemo(() => {
        if (selectedTab === '본부 진단 리포트' || filteredData.length === 0) return [];

        const parseNum = (val) => Number(String(val).replace(/[^0-9.-]+/g, "")) || 0;

        let maxPremium = 0;
        let topPremiumRow = null;
        filteredData.forEach(row => {
          const currentPremium = parseNum(row['보험료']);
          if (currentPremium > maxPremium) {
            maxPremium = currentPremium;
            topPremiumRow = row;
          }
        });

        const remainingForActivity = topPremiumRow 
          ? filteredData.filter(row => row !== topPremiumRow) 
          : [...filteredData];

        let maxActivity = 0;
        let topActivityRow = null;
        remainingForActivity.forEach(row => {
          const currentActivity = parseNum(row['활동계']);
          if (currentActivity > maxActivity) {
            maxActivity = currentActivity;
            topActivityRow = row;
          }
        });

        const rest = remainingForActivity.filter(row => row !== topActivityRow);
        rest.sort((a, b) => {
          const activityA = parseNum(a['활동계']);
          const activityB = parseNum(b['활동계']);
          if (activityB !== activityA) {
            return activityB - activityA;
          }
          const sabunA = String(a['사번'] || '');
          const sabunB = String(b['사번'] || '');
          return sabunA.localeCompare(sabunB, undefined, { numeric: true });
        });

        const result = [];
        if (topPremiumRow) result.push({ ...topPremiumRow, badgePremium: true, badgeActivity: false });
        if (topActivityRow) result.push({ ...topActivityRow, badgePremium: false, badgeActivity: true });
        
        const restWithBadges = rest.map(row => ({ ...row, badgePremium: false, badgeActivity: false }));

        return [...result, ...restWithBadges];
      }, [filteredData, selectedTab]);

      const diagnosticData = useMemo(() => {
        if (selectedTab !== '본부 진단 리포트') return null;

        const parseNum = (val) => Number(String(val).replace(/[^0-9.-]+/g, "")) || 0;
        
        const groups = {
          lowActivity: [],
          lowAppointment: [],
          lowClosing: [],
          lowReferral: []
        };

        const pastResultData = data.filter(d => {
          if (d['예정결과'] !== '결과') return false;
          const y = parseInt(d['연도'], 10);
          const w = parseInt(d['주차'], 10);
          return (y < currentTimeInfo.year) || (y === currentTimeInfo.year && w < currentTimeInfo.week);
        });

        const distinctWeeks = [...new Set(pastResultData.map(d => `${d['연도']}-${String(d['주차']).padStart(2, '0')}`))].sort();
        
        const currentTarget = `${selectedYear}-${String(selectedWeek).padStart(2, '0')}`;
        let targetIdx = distinctWeeks.indexOf(currentTarget);
        
        if (targetIdx === -1) {
          targetIdx = distinctWeeks.filter(w => w <= currentTarget).length - 1;
        }

        const targetWeeks = targetIdx >= 0 
          ? distinctWeeks.slice(Math.max(0, targetIdx - diagnosticPeriod + 1), targetIdx + 1)
          : [];

        const relevantData = pastResultData.filter(item => {
          if (selectedDept !== '전체' && item['소속'] !== selectedDept) return false;
          const weekStr = `${item['연도']}-${String(item['주차']).padStart(2, '0')}`;
          return targetWeeks.includes(weekStr);
        });

        const agg = {};
        relevantData.forEach(row => {
          const sabun = row['사번'];
          if (!agg[sabun]) {
            agg[sabun] = { 사번: sabun, 이름: row['이름'], 소속: row['소속'], TA: 0, AP: 0, N: 0, 소개: 0, 활동계: 0, weeks: new Set() };
          }
          agg[sabun].TA += parseNum(row['TA']);
          agg[sabun].AP += parseNum(row['AP']);
          agg[sabun].N += parseNum(row['N']);
          agg[sabun].소개 += parseNum(row['소개']);
          agg[sabun].활동계 += parseNum(row['활동계']);
          agg[sabun].weeks.add(`${row['연도']}-${row['주차']}`);
        });

        Object.values(agg).forEach(member => {
          const avgActivity = member.활동계 / member.weeks.size || 0;
          const avgReferral = member.소개 / member.weeks.size || 0;
          const taApRate = member.TA > 0 ? (member.AP / member.TA) * 100 : (member.AP > 0 ? 100 : 0);
          const apNRate = member.AP > 0 ? (member.N / member.AP) * 100 : (member.N > 0 ? 100 : 0);

          const memberData = {
            ...member,
            avgActivity: Math.round(avgActivity),
            avgReferral: Number(avgReferral.toFixed(1)),
            taApRate: Math.round(taApRate),
            apNRate: Math.round(apNRate)
          };

          if (memberData.avgActivity < 15) groups.lowActivity.push(memberData);
          if (memberData.taApRate < 50) groups.lowAppointment.push(memberData);
          if (memberData.apNRate < 30) groups.lowClosing.push(memberData);
          if (memberData.avgReferral < 2) groups.lowReferral.push(memberData);
        });

        groups.lowActivity.sort((a, b) => a.avgActivity - b.avgActivity);
        groups.lowAppointment.sort((a, b) => a.taApRate - b.taApRate);
        groups.lowClosing.sort((a, b) => a.apNRate - b.apNRate);
        groups.lowReferral.sort((a, b) => a.avgReferral - b.avgReferral);

        return groups;
      }, [data, selectedTab, selectedYear, selectedWeek, selectedDept, diagnosticPeriod]);

        const expectedRatios = {
          TA: calcRatio(actual.TA, expected.TA),
          AP: calcRatio(actual.AP, expected.AP),

                      </tr>
                      <tr className="bg-orange-50/60 hover:bg-orange-100/60 transition-colors">

                  className="flex items-center gap-2 px-4 py-2 bg-orange-50 text-orange-600 hover:bg-orange-100 rounded-lg transition-colors text-sm font-medium"
                >
                  <RefreshCw size={16} className={loading ? "animate-spin" : ""} />
                  데이터 새로고침
                </button>
              </div>
            </div>

            {usingMockData && (
              <div className="bg-orange-50 border-l-4 border-orange-400 p-4 rounded-r-lg flex items-start gap-3">
                <AlertCircle className="text-orange-500 shrink-0 mt-0.5" size={20} />
                <div className="text-sm text-orange-800">
                  <p className="font-semibold mb-1">현재 예시 데이터로 화면을 보여드리고 있습니다.</p>
                  <p className="opacity-90">실제 데이터를 연동하려면 구글 스프레드시트의 공유 설정을 <strong>'링크가 있는 모든 사용자' (뷰어)</strong>로 변경해주시거나, '파일 > 공유 > 웹에 게시'에서 CSV 형식으로 게시를 완료해 주십시오.</p>
                </div>
              </div>
            )}

            <div className="bg-white p-5 rounded-2xl shadow-sm border border-orange-100 space-y-5">
              <div className="flex bg-gray-50 p-1 rounded-xl w-full max-w-2xl">
                {['예정', '결과', '본부 진단 리포트'].map(tab => (
                  <button
                    key={tab}
                    onClick={() => setSelectedTab(tab)}
                    className={`flex-1 py-2.5 text-sm font-semibold rounded-lg transition-all duration-200 ${
                      selectedTab === tab 
                        ? 'bg-orange-500 text-white shadow-md' 
                        : 'text-gray-500 hover:text-orange-500 hover:bg-orange-50'
                    }`}
                  >
                    {tab}
                  </button>
                ))}
              </div>

              <div className="flex flex-wrap gap-4">
                <div className="flex-1 min-w-[200px]">
                  <label className="flex items-center gap-1.5 text-xs font-semibold text-gray-500 mb-2 uppercase tracking-wider">
                    <Calendar size={14} /> 연도
                  </label>
                  <select 
                    value={selectedYear} 
                    onChange={(e) => setSelectedYear(e.target.value)}
                    className="w-full bg-gray-50 border border-gray-200 text-gray-800 rounded-lg px-4 py-2.5 outline-none focus:ring-2 focus:ring-orange-200 focus:border-orange-400 transition-all"
                  >
                    {availableYears.map(year => (
                      <option key={year} value={year}>{year}년</option>
                    ))}
                  </select>
                </div>
                
                <div className="flex-1 min-w-[200px]">
                  <label className="flex items-center gap-1.5 text-xs font-semibold text-gray-500 mb-2 uppercase tracking-wider">
                    <Calendar size={14} /> 주차
                  </label>
                  <select 
                    value={selectedWeek} 
                    onChange={(e) => setSelectedWeek(e.target.value)}
                    className="w-full bg-gray-50 border border-gray-200 text-gray-800 rounded-lg px-4 py-2.5 outline-none focus:ring-2 focus:ring-orange-200 focus:border-orange-400 transition-all"
                  >
                    {availableWeeks.map(week => (
                      <option key={week} value={week}>{getWeekLabel(week, selectedYear)}</option>
                    ))}
                  </select>
                </div>

                <div className="flex-1 min-w-[200px]">
                  <label className="flex items-center gap-1.5 text-xs font-semibold text-gray-500 mb-2 uppercase tracking-wider">
                    <Users size={14} /> 소속
                  </label>
                  <select 
                    value={selectedDept} 
                    onChange={(e) => setSelectedDept(e.target.value)}
                    className="w-full bg-gray-50 border border-gray-200 text-gray-800 rounded-lg px-4 py-2.5 outline-none focus:ring-2 focus:ring-orange-200 focus:border-orange-400 transition-all"
                  >
                    {availableDepts.map(dept => (
                      <option key={dept} value={dept}>{dept}</option>
                    ))}
                  </select>
                </div>
              </div>
            </div>

            {/* 1. 예정/결과 테이블 */}
            {(selectedTab === '예정' || selectedTab === '결과') && (
              <div className="bg-white rounded-2xl shadow-sm border border-orange-100 overflow-hidden animate-in fade-in duration-500">
                <div className="overflow-x-auto">
                  <table className="w-full text-sm text-center border-collapse min-w-[800px]">
                    <thead className="bg-orange-100 text-orange-900 border-b border-orange-200">
                      <tr>
                        <th style={{ width: '15%' }} className="py-3.5 px-4 font-semibold">소속</th>
                        <th style={{ width: '15%' }} className="py-3.5 px-4 font-semibold">이름</th>
                        <th style={{ width: '7.5%' }} className="py-3.5 px-2 font-semibold">TA</th>
                        <th style={{ width: '7.5%' }} className="py-3.5 px-2 font-semibold">AP</th>
                        <th style={{ width: '7.5%' }} className="py-3.5 px-2 font-semibold">P</th>
                        <th style={{ width: '7.5%' }} className="py-3.5 px-2 font-semibold">C</th>
                        <th style={{ width: '7.5%' }} className="py-3.5 px-2 font-semibold">N</th>
                        <th style={{ width: '7.5%' }} className="py-3.5 px-2 font-semibold">소개</th>
                        <th style={{ width: '10%' }} className="py-3.5 px-3 font-bold bg-orange-200/50">활동계</th>
                        <th style={{ width: '15%' }} className="py-3.5 px-4 font-semibold">보험료</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-100">
                      {loading ? (
                        <tr>
                          <td colSpan="10" className="py-12 text-center text-gray-400">
                            <RefreshCw className="animate-spin mx-auto mb-3 text-orange-300" size={24} />
                            데이터를 불러오는 중입니다...
                          </td>
                        </tr>
                      ) : processedData.length === 0 ? (
                        <tr>
                          <td colSpan="10" className="py-12 text-center text-gray-400">
                            <AlertCircle className="mx-auto mb-3 text-gray-300" size={24} />
                            선택한 조건에 해당하는 데이터가 없습니다.
                          </td>
                        </tr>
                      ) : (
                        processedData.map((row, idx) => (
                          <tr key={idx} className={`transition-colors ${row.badgePremium || row.badgeActivity ? 'bg-orange-50/80 hover:bg-orange-100/80' : 'hover:bg-orange-50/50'}`}>
                            <td className="py-3 px-4 font-medium text-gray-600">{row['소속']}</td>
                            <td className="py-3 px-4 font-semibold text-gray-800">
                              <div className="flex items-center justify-center gap-1.5">
                                <button 
                                  onClick={() => handleOpenModal(row['사번'], row['이름'])}
                                  className="hover:text-orange-600 hover:underline underline-offset-4 cursor-pointer focus:outline-none transition-colors"
                                >
                                  {row['이름']}
                                </button>
                                <div className="flex gap-1">
                                  {row.badgePremium && (
                                    <span className="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-bold bg-yellow-100 text-yellow-800 border border-yellow-200" title="보험료 1등">
                                      👑 보험료
                                    </span>
                                  )}
                                  {row.badgeActivity && (
                                    <span className="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-bold bg-orange-100 text-orange-800 border border-orange-200" title="활동계 1등">
                                      🔥 활동계
                                    </span>
                                  )}
                                </div>
                              </div>
                            </td>
                            <td className="py-3 px-2 text-gray-600">{row['TA']}</td>
                            <td className="py-3 px-2 text-gray-600">{row['AP']}</td>
                            <td className="py-3 px-2 text-gray-600">{row['P']}</td>
                            <td className="py-3 px-2 text-gray-600">{row['C']}</td>
                            <td className={`py-3 px-2 ${Number(row['N']) >= 3 ? 'text-red-600 font-bold' : 'text-gray-600'}`}>{row['N']}</td>
                            <td className="py-3 px-2 text-gray-600">{row['소개']}</td>
                            <td className="py-3 px-3 font-bold text-orange-600 bg-orange-50/30">{row['활동계']}</td>
                            <td className="py-3 px-4 font-medium text-gray-700 text-right pr-6">{row['보험료']}</td>
                          </tr>
                        ))
                      )}
                    </tbody>
                  </table>
                </div>
                {!loading && processedData.length > 0 && (
                  <div className="bg-orange-50/50 p-4 border-t border-orange-100 flex justify-between items-center text-sm">
                    <span className="text-gray-500">
                      총 <strong className="text-orange-600">{processedData.length}</strong>건의 데이터가 조회되었습니다.
                    </span>
                  </div>
                )}
              </div>
            )}

            {/* 2. 본부 지능형 진단 리포트 */}
            {selectedTab === '본부 진단 리포트' && diagnosticData && (
              <div className="animate-in fade-in duration-500 space-y-6">
                
                <div className="bg-orange-50 p-5 border border-orange-100 rounded-2xl flex flex-col md:flex-row md:items-center justify-between gap-4 shadow-sm">
                   <div className="flex items-center gap-3">
                     <ActivityIcon size={24} className="text-orange-500" />
                     <div>
                       <div className="flex items-center gap-3">
                         <h2 className="text-lg font-bold text-gray-800">본부 지능형 진단 리포트</h2>
                         <select 
                           value={diagnosticPeriod}
                           onChange={(e) => setDiagnosticPeriod(Number(e.target.value))}
                           className="bg-white border border-orange-200 text-sm font-bold text-orange-700 rounded-md px-2 py-1 outline-none focus:ring-2 focus:ring-orange-300 transition-shadow"
                         >
                           <option value={50}>직전 50주</option>
                           <option value={25}>직전 25주</option>
                           <option value={12}>직전 12주</option>
                           <option value={4}>직전 4주</option>
                         </select>
                       </div>
                       <p className="text-sm text-gray-600 mt-1">선택한 기준 주차부터 {diagnosticPeriod}주간의 결과 데이터를 합산하여 조직의 취약점을 자동 진단합니다.</p>
                     </div>
                   </div>
                   <div className="text-xs bg-white border border-orange-200 px-3 py-1.5 rounded-full text-orange-700 font-semibold shadow-sm text-center">
                     복합 취약점 독립 진단 적용 (다중 해당 가능)
                   </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6">
                  
                  {/* 활동량 체크 */}
                  <div className="bg-white rounded-xl shadow-sm border border-red-200 p-5 flex flex-col h-full relative overflow-hidden group hover:border-red-300 transition-colors">
                    <div className="absolute top-0 left-0 w-full h-1 bg-red-400"></div>
                    <div className="border-b border-red-100 pb-3 mb-4">
                      <h3 className="text-base font-bold text-red-800 flex items-center gap-2">
                        <TrendingDown size={18} className="text-red-500" /> 활동량 체크
                      </h3>
                      {/* 설명글 줄바꿈 처리 */}
                      <p className="text-xs text-red-600/80 mt-1.5 font-medium leading-relaxed">
                        주간 평균 활동계 15건 미만<br/>
                        <span className="text-gray-400 font-normal">(기본 볼륨 증대)</span>
                      </p>
                    </div>
                    <div className="space-y-3 flex-1 overflow-y-auto pr-1">
                      {diagnosticData.lowActivity.length === 0 ? (
                        <p className="text-sm text-gray-400 text-center py-6">해당되는 인원이 없습니다.</p>
                      ) : (
                        diagnosticData.lowActivity.map((member, idx) => (
                          <div key={idx} className="bg-red-50/40 rounded-lg p-3 border border-red-100 hover:bg-red-50 transition-colors flex flex-col gap-2">
                            <div className="flex justify-between items-center">
                              <button onClick={() => handleOpenModal(member['사번'], member['이름'])} className="font-bold text-gray-800 hover:text-red-600 hover:underline underline-offset-4">{member['이름']}</button>
                              {/* 기존 배지를 코칭 메시지 호출 버튼으로 변경 (은닉) */}
                              <button 
                                onClick={() => generateCoachingMessage(member, '활동량 체크', `평균 ${member.avgActivity}건`)}
                                className="text-xs px-2 py-1 bg-white rounded-md font-bold text-red-600 border border-red-200 shadow-sm hover:bg-red-50 transition-colors cursor-pointer"
                              >
                                평균 {member.avgActivity}건
                              </button>
                            </div>
                            <div className="flex justify-between items-end mt-0.5 text-xs text-gray-500">
                              <span>총 활동 {member.활동계}건 / {member.weeks.size}주</span>
                              <span>{member['소속']}</span>
                            </div>
                          </div>
                        ))
                      )}
                    </div>
                  </div>

                  {/* 약속 체결 체크 */}
                  <div className="bg-white rounded-xl shadow-sm border border-amber-200 p-5 flex flex-col h-full relative overflow-hidden group hover:border-amber-300 transition-colors">
                    <div className="absolute top-0 left-0 w-full h-1 bg-amber-400"></div>
                    <div className="border-b border-amber-100 pb-3 mb-4">
                      <h3 className="text-base font-bold text-amber-800 flex items-center gap-2">
                        <Users size={18} className="text-amber-500" /> 약속 체결 체크
                      </h3>
                      <p className="text-xs text-amber-600/80 mt-1.5 font-medium leading-relaxed">
                        누적 TA 대비 AP 전환 50% 미만<br/>
                        <span className="text-gray-400 font-normal">(스크립트 점검)</span>
                      </p>
                    </div>
                    <div className="space-y-3 flex-1 overflow-y-auto pr-1">
                      {diagnosticData.lowAppointment.length === 0 ? (
                        <p className="text-sm text-gray-400 text-center py-6">해당되는 인원이 없습니다.</p>
                      ) : (
                        diagnosticData.lowAppointment.map((member, idx) => (
                          <div key={idx} className="bg-amber-50/40 rounded-lg p-3 border border-amber-100 hover:bg-amber-50 transition-colors flex flex-col gap-2">
                            <div className="flex justify-between items-center">
                              <button onClick={() => handleOpenModal(member['사번'], member['이름'])} className="font-bold text-gray-800 hover:text-amber-600 hover:underline underline-offset-4">{member['이름']}</button>
                              {/* 기존 배지를 코칭 메시지 호출 버튼으로 변경 (은닉) */}
                              <button 
                                onClick={() => generateCoachingMessage(member, '약속 체결 체크', `전환율 ${member.taApRate}%`)}
                                className="text-xs px-2 py-1 bg-white rounded-md font-bold text-amber-600 border border-amber-200 shadow-sm hover:bg-amber-50 transition-colors cursor-pointer"
                              >
                                전환율 {member.taApRate}%
                              </button>
                            </div>
                            <div className="flex justify-between items-end mt-0.5 text-xs text-gray-500">
                              <span>누적 TA: {member.TA} ➔ AP: {member.AP}</span>
                              <span>{member['소속']}</span>
                            </div>
                          </div>
                        ))
                      )}
                    </div>
                  </div>

                  {/* 클로징 체크 */}
                  <div className="bg-white rounded-xl shadow-sm border border-blue-200 p-5 flex flex-col h-full relative overflow-hidden group hover:border-blue-300 transition-colors">
                    <div className="absolute top-0 left-0 w-full h-1 bg-blue-400"></div>
                    <div className="border-b border-blue-100 pb-3 mb-4">
                      <h3 className="text-base font-bold text-blue-800 flex items-center gap-2">
                        <Target size={18} className="text-blue-500" /> 클로징 체크
                      </h3>
                      <p className="text-xs text-blue-600/80 mt-1.5 font-medium leading-relaxed">
                        누적 AP 대비 N 전환 30% 미만<br/>
                        <span className="text-gray-400 font-normal">(동반/클로징 지원)</span>
                      </p>
                    </div>
                    <div className="space-y-3 flex-1 overflow-y-auto pr-1">
                      {diagnosticData.lowClosing.length === 0 ? (
                        <p className="text-sm text-gray-400 text-center py-6">해당되는 인원이 없습니다.</p>
                      ) : (
                        diagnosticData.lowClosing.map((member, idx) => (
                          <div key={idx} className="bg-blue-50/40 rounded-lg p-3 border border-blue-100 hover:bg-blue-50 transition-colors flex flex-col gap-2">
                            <div className="flex justify-between items-center">
                              <button onClick={() => handleOpenModal(member['사번'], member['이름'])} className="font-bold text-gray-800 hover:text-blue-600 hover:underline underline-offset-4">{member['이름']}</button>
                              {/* 기존 배지를 코칭 메시지 호출 버튼으로 변경 (은닉) */}
                              <button 
                                onClick={() => generateCoachingMessage(member, '클로징 체크', `전환율 ${member.apNRate}%`)}
                                className="text-xs px-2 py-1 bg-white rounded-md font-bold text-blue-600 border border-blue-200 shadow-sm hover:bg-blue-50 transition-colors cursor-pointer"
                              >
                                전환율 {member.apNRate}%
                              </button>
                            </div>
                            <div className="flex justify-between items-end mt-0.5 text-xs text-gray-500">
                              <span>누적 AP: {member.AP} ➔ N: {member.N}</span>
                              <span>{member['소속']}</span>
                            </div>
                          </div>
                        ))
                      )}
                    </div>
                  </div>

                  {/* 소개 확보 체크 */}
                  <div className="bg-white rounded-xl shadow-sm border border-emerald-200 p-5 flex flex-col h-full relative overflow-hidden group hover:border-emerald-300 transition-colors">
                    <div className="absolute top-0 left-0 w-full h-1 bg-emerald-400"></div>
                    <div className="border-b border-emerald-100 pb-3 mb-4">
                      <h3 className="text-base font-bold text-emerald-800 flex items-center gap-2">
                        <UserPlus size={18} className="text-emerald-500" /> 소개 확보 체크
                      </h3>
                      <p className="text-xs text-emerald-600/80 mt-1.5 font-medium leading-relaxed">
                        주간 평균 소개 2명 미만<br/>
                        <span className="text-gray-400 font-normal">(기존 고객 터치/스크립트 점검)</span>
                      </p>
                    </div>
                    <div className="space-y-3 flex-1 overflow-y-auto pr-1">
                      {diagnosticData.lowReferral.length === 0 ? (
                        <p className="text-sm text-gray-400 text-center py-6">해당되는 인원이 없습니다.</p>
                      ) : (
                        diagnosticData.lowReferral.map((member, idx) => (
                          <div key={idx} className="bg-emerald-50/40 rounded-lg p-3 border border-emerald-100 hover:bg-emerald-50 transition-colors flex flex-col gap-2">
                            <div className="flex justify-between items-center">
                              <button onClick={() => handleOpenModal(member['사번'], member['이름'])} className="font-bold text-gray-800 hover:text-emerald-600 hover:underline underline-offset-4">{member['이름']}</button>
                              {/* 기존 배지를 코칭 메시지 호출 버튼으로 변경 (은닉) */}
                              <button 
                                onClick={() => generateCoachingMessage(member, '소개 확보 체크', `평균 ${member.avgReferral}명`)}
                                className="text-xs px-2 py-1 bg-white rounded-md font-bold text-emerald-600 border border-emerald-200 shadow-sm hover:bg-emerald-50 transition-colors cursor-pointer"
                              >
                                평균 {member.avgReferral}명
                              </button>
                            </div>
                            <div className="flex justify-between items-end mt-0.5 text-xs text-gray-500">
                              <span>총 소개 {member.소개}명 / {member.weeks.size}주</span>
                              <span>{member['소속']}</span>
                            </div>
                          </div>
                        ))
                      )}
                    </div>
                  </div>

                </div>
              </div>
            )}

            {/* 팝업 렌더링 호출 */}
            {renderModal()}
            {renderCoachingModal()}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
